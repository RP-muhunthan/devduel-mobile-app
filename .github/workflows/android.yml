name: DevDuel Enterprise CI/CD Pipeline

# =====================================================================
# This is the main Continuous Integration & Continuous Deployment (CI/CD)
# workflow for the DevDuel platform. It triggers automatically when code
# is pushed to the main branch or can be run manually (workflow_dispatch).
# It executes automated tests across different environments and generates
# a consolidated master report deployed to GitHub Pages.
# =====================================================================

on:
  push:
    branches: [ "main" ] # Triggers when code is merged/pushed to main
  workflow_dispatch:     # Allows manual triggering from the Actions tab

# =====================================================================
# PERMISSIONS
# We explicitly grant the GITHUB_TOKEN permissions required to deploy
# our final HTML test reports to GitHub Pages securely.
# =====================================================================
permissions:
  contents: read
  pages: write
  id-token: write

# Prevents multiple deployments from running simultaneously and clashing
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # -------------------------------------------------------------------
  # JOB 1: SELENIUM WEBSITE TESTS
  # Runs the automated E2E tests for the web frontend.
  # -------------------------------------------------------------------
  selenium:
    name: Selenium — Website Tests (300)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Pulls the repository code into the runner
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Dependencies
        run: npm install
      - name: Run Selenium Website Tests
        run: npm run test:selenium
      - name: Upload Artifact
        if: always() # Ensure reports are uploaded even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Website-Tests-300
          path: reports/selenium-report.*
          retention-days: 14

  # -------------------------------------------------------------------
  # JOB 2: APPIUM ANDROID TESTS
  # Runs the automated mobile E2E tests for the Android app.
  # -------------------------------------------------------------------
  appium:
    name: Appium — Android Tests (300)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Dependencies
        run: npm install
      - name: Run Appium Android Tests
        run: npm run test:appium
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Android-Tests-300
          path: reports/appium-report.*
          retention-days: 14

  # -------------------------------------------------------------------
  # JOB 3: VALIDATION TESTS
  # Runs structural validations, API schema checks, and linting.
  # -------------------------------------------------------------------
  validation:
    name: Validation Tests (300)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Dependencies
        run: npm install
      - name: Run Validation Tests
        run: npm run test:validation
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Validation-Tests-300
          path: reports/validation-report.*
          retention-days: 14

  # -------------------------------------------------------------------
  # JOB 4: DEPLOYMENT STATUS
  # Verifies the live environment's health and deployment success.
  # -------------------------------------------------------------------
  deployment_status:
    name: Deployment Status (300)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Dependencies
        run: npm install
      - name: Check Deployment Status
        run: npm run status:deployment
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Deployment-Status-300
          path: reports/deployment-report.*
          retention-days: 14

  # -------------------------------------------------------------------
  # JOB 5: LOAD TESTING
  # Simulates high traffic to ensure the platform performs under stress.
  # -------------------------------------------------------------------
  load_testing:
    name: Load Testing — Performance (300)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Dependencies
        run: npm install
      - name: Run Load Testing
        run: npm run test:load
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Load-Testing-Performance-300
          path: reports/load-test-report.*
          retention-days: 14

  # -------------------------------------------------------------------
  # JOB 6: COMPILE MASTER REPORT
  # Waits for all testing jobs to finish, downloads their individual
  # reports, and compiles a final master overview report.
  # -------------------------------------------------------------------
  compile_report:
    name: Compile Master Report
    needs: [selenium, appium, validation, deployment_status, load_testing] # Waits for these to finish
    runs-on: ubuntu-latest
    if: always() # Runs even if some previous jobs failed
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Dependencies
        run: npm install
      
      # Download reports generated by the parallel jobs above
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports/
          merge-multiple: true
          
      - name: Generate Master Report
        run: npm run generate:report
        
      # Upload the final consolidated folder
      - name: Upload Master Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Master-Report-300
          path: reports/
          retention-days: 14

  # -------------------------------------------------------------------
  # JOB 7: DEPLOY TO GITHUB PAGES
  # Takes the Master Report artifact and pushes it to a live public URL
  # using GitHub Pages, making it easy to view the CI/CD results.
  # -------------------------------------------------------------------
  deploy_pages:
    name: Deploy Reports to GitHub Pages
    needs: compile_report
    runs-on: ubuntu-latest
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # Pull the master report down from the previous step
      - name: Download Master Report
        uses: actions/download-artifact@v4
        with:
          name: Master-Report-300
          path: reports/
          
      # Prepare the folder for GitHub Pages
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/
          
      # Push it live
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
