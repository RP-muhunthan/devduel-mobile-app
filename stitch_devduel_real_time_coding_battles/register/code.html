<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Roboto:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#4d4732",
                        "surface-container-lowest": "#0d0e0f",
                        "surface-container-low": "#1a1c1c",
                        "on-tertiary": "#373100",
                        "secondary-fixed-dim": "#f7bd48",
                        "primary-container": "#ffd700",
                        "surface-bright": "#38393a",
                        "on-secondary-fixed": "#271900",
                        "on-error": "#690005",
                        "surface-tint": "#e9c400",
                        "secondary-fixed": "#ffdea6",
                        "surface-container-high": "#292a2a",
                        "primary": "#fff6df",
                        "outline": "#999077",
                        "tertiary-fixed-dim": "#dcc82c",
                        "tertiary": "#fff6d2",
                        "surface-container-highest": "#343535",
                        "on-tertiary-container": "#6b5f00",
                        "error": "#ffb4ab",
                        "primary-fixed-dim": "#e9c400",
                        "on-primary-container": "#705e00",
                        "on-background": "#e3e2e2",
                        "surface-container": "#1e2020",
                        "on-surface": "#e3e2e2",
                        "primary-fixed": "#ffe16d",
                        "on-primary": "#3a3000",
                        "on-secondary-container": "#392700",
                        "surface-variant": "#343535",
                        "on-tertiary-fixed-variant": "#504700",
                        "background": "#121414",
                        "error-container": "#93000a",
                        "surface": "#121414",
                        "on-primary-fixed-variant": "#544600",
                        "surface-dim": "#121414",
                        "tertiary-container": "#f1db40",
                        "inverse-primary": "#705d00",
                        "inverse-on-surface": "#2f3131",
                        "tertiary-fixed": "#fae448",
                        "on-tertiary-fixed": "#201c00",
                        "inverse-surface": "#e3e2e2",
                        "secondary": "#f7bd48",
                        "on-secondary": "#412d00",
                        "on-error-container": "#ffdad6",
                        "on-surface-variant": "#d0c6ab",
                        "on-primary-fixed": "#221b00",
                        "secondary-container": "#ba880f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "component-gap": "12px",
                        "gutter": "16px",
                        "container-margin": "24px",
                        "section-gap": "32px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label-caps": ["JetBrains Mono"],
                        "code-block": ["JetBrains Mono"],
                        "body-md": ["Roboto"],
                        "body-lg": ["Roboto"],
                        "headline-lg": ["Roboto"],
                        "headline-md": ["Roboto"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "code-block": ["14px", {"lineHeight": "22px", "fontWeight": "400"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0A0A0A;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen text-on-surface">
<!-- Top App Bar -->
<header class="bg-[#0A0A0A] border-b border-zinc-800 flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-yellow-400 cursor-pointer active:opacity-70 transition-opacity" data-icon="arrow_back">arrow_back</span>
<span class="text-xl font-black italic tracking-tighter text-yellow-500 font-mono uppercase">DevDuel</span>
</div>
<span class="material-symbols-outlined text-zinc-500 hover:text-yellow-300 transition-colors cursor-pointer" data-icon="notifications">notifications</span>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center px-container-margin py-section-gap">
<div class="w-full max-w-md bg-[#111111] rounded-xl border border-zinc-800 p-8 shadow-2xl relative overflow-hidden">
<!-- Background Accent Glow -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-yellow-500/10 rounded-full blur-3xl"></div>
<div class="relative z-10">
<!-- Title -->
<div class="mb-section-gap">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Join the elite arena of competitive coders.</p>
</div>
<!-- Registration Form -->
<form class="space-y-gutter">
<!-- Full Name -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Full Name</label>
<div class="relative">
<input class="w-full bg-[#0A0A0A] border border-zinc-800 focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 rounded-lg h-12 px-4 text-on-surface transition-all font-body-md outline-none" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Email Address</label>
<div class="relative">
<input class="w-full bg-[#0A0A0A] border border-zinc-800 focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 rounded-lg h-12 px-4 text-on-surface transition-all font-body-md outline-none" placeholder="dev@duel.io" type="email"/>
</div>
</div>
<!-- College Name with Suggetions -->
<div class="space-y-2 relative">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">College Name</label>
<div class="relative">
<input class="w-full bg-[#0A0A0A] border border-zinc-800 focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 rounded-lg h-12 px-4 text-on-surface transition-all font-body-md outline-none" placeholder="Start typing your institute..." type="text"/>
<!-- Mock Dropdown Suggestions -->
<div class="absolute top-full left-0 w-full mt-2 bg-[#1A1A1A] border border-zinc-800 rounded-lg shadow-xl hidden">
<div class="px-4 py-3 hover:bg-zinc-800 cursor-pointer font-body-md border-b border-zinc-800">Stanford University</div>
<div class="px-4 py-3 hover:bg-zinc-800 cursor-pointer font-body-md border-b border-zinc-800">MIT</div>
<div class="px-4 py-3 hover:bg-zinc-800 cursor-pointer font-body-md">Indian Institute of Technology</div>
</div>
</div>
</div>
<!-- Password Fields Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Password</label>
<input class="w-full bg-[#0A0A0A] border border-zinc-800 focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 rounded-lg h-12 px-4 text-on-surface transition-all font-body-md outline-none" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Confirm</label>
<input class="w-full bg-[#0A0A0A] border border-zinc-800 focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 rounded-lg h-12 px-4 text-on-surface transition-all font-body-md outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Register Button -->
<button class="w-full h-12 mt-unit bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-600 text-black font-bold font-label-caps rounded-lg transition-colors flex items-center justify-center gap-2" type="submit">
                        REGISTER
                        <span class="material-symbols-outlined text-sm" data-icon="terminal">terminal</span>
</button>
</form>
<!-- Login Footer -->
<div class="mt-8 text-center">
<p class="font-body-md text-on-surface-variant">
                        Already have an account? 
                        <a class="text-yellow-400 font-bold hover:underline decoration-yellow-400 underline-offset-4" href="#">Login</a>
</p>
</div>
</div>
</div>
</main>
<!-- Side Decoration (Bento Style Suggestion) -->
<div class="fixed right-10 bottom-24 hidden xl:block w-64 space-y-gutter opacity-40">
<div class="bg-[#111111] border border-zinc-800 rounded-xl p-4">
<div class="flex items-center gap-3 mb-2">
<span class="material-symbols-outlined text-yellow-500" data-icon="bolt">bolt</span>
<span class="font-label-caps text-[10px] uppercase">Fastest Growth</span>
</div>
<div class="h-2 w-full bg-zinc-800 rounded-full overflow-hidden">
<div class="h-full bg-yellow-500 w-3/4"></div>
</div>
</div>
<div class="bg-[#111111] border border-zinc-800 rounded-xl p-4">
<div class="flex items-center gap-3 mb-2">
<span class="material-symbols-outlined text-yellow-500" data-icon="trophy">trophy</span>
<span class="font-label-caps text-[10px] uppercase">Season 4 Rewards</span>
</div>
<div class="font-headline-md text-sm text-on-surface">5,000+ Active Duelists</div>
</div>
</div>
<!-- Bottom Navigation Bar (Hidden on this focused screen, but structure present as per shell logic) -->
<!-- The Shell Visibility & Relevance mandate suggests suppressing the nav for transactional screens like Register -->
<!-- However, we will maintain the background bar style for visual continuity if needed, but per rule: "exclude the navigation shell if the page intent is: Login, Sign-up" -->
<!-- Spacer for the bottom visual weight -->
<div class="h-8"></div>
</body></html>
