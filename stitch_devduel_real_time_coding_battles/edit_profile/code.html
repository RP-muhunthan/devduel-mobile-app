            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background-color: #000000;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-black text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-black border-b border-zinc-800">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-zinc-500 cursor-pointer hover:text-yellow-400 transition-colors">arrow_back</span>
<h1 class="font-mono uppercase tracking-widest text-sm text-yellow-500 font-black italic tracking-tighter">Edit Profile</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-zinc-500 hover:text-yellow-400 transition-colors" data-icon="settings">settings</span>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-container-margin max-w-2xl mx-auto w-full">
<!-- Profile Photo Section -->
<div class="flex flex-col items-center mb-section-gap">
<div class="relative group">
<div class="w-32 h-32 rounded-full border-2 border-outline-variant overflow-hidden bg-surface-container">
<img class="w-full h-full object-cover" data-alt="A professional headshot of a young South Asian male developer with a confident expression, set against a dark, minimalist tech-themed background. The lighting is cinematic with golden rim lights highlighting his features, maintaining a high-contrast aesthetic that aligns with the premium hacker-elite design system. The atmosphere is sharp and technically sophisticated." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBC4P6evn7Q3ohKQAQtNWhlHi4vFEpiIw6It_Dwlsm9UZ2lktrErBSMSZBqs0wEu4npxHE4ou0Ev3_SLApREpouzktnjAgVgdyqkdxecI4QGTRGbY1c92n_2cdTNe1HEXR6Tx8RgH55h7Ywy7rpyN45UsJ_MUaacdnRxxCS7aepC4QO8nXnx_CgWgzI4sf5BNjm_WJga9kvVBrR5TmMEb8tc5fXGJhg0tcR1sWmBupqqtNDX4XCGBksdKg38GOoi-TzeAfsl8D_TikN"/>
</div>
<button class="absolute bottom-0 right-0 bg-primary-container text-on-primary-container p-2 rounded-full shadow-lg hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
<p class="mt-4 font-label-caps text-label-caps text-outline uppercase">Change Photo</p>
</div>
<!-- Form Fields -->
<div class="space-y-6">
<!-- Name Input -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-yellow-500 uppercase px-1">Name</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 text-on-surface font-body-lg focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all outline-none" type="text" value="Rahul Kumar"/>
</div>
<!-- College Input -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-yellow-500 uppercase px-1">College</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 text-on-surface font-body-lg focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all outline-none" type="text" value="Stanford University"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant">school</span>
</div>
</div>
<!-- Bio Input -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-yellow-500 uppercase px-1">Bio</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 text-on-surface font-body-lg focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all outline-none resize-none" rows="4">Algorithm enthusiast and competitive coder.</textarea>
</div>
</div>
<!-- Action Button -->
<div class="mt-12">
<button class="w-full h-12 bg-primary-container text-on-primary-container font-label-caps text-label-caps uppercase tracking-widest rounded-lg font-bold shadow-[0_4px_20px_rgba(255,215,0,0.15)] hover:bg-secondary-container active:scale-[0.98] transition-all">
                Save Changes
            </button>
</div>
<!-- Danger Zone -->
<div class="mt-section-gap pt-gutter border-t border-zinc-900">
<button class="flex items-center gap-2 text-error font-body-md hover:underline">
<span class="material-symbols-outlined text-[18px]">delete</span>
                Deactivate Account
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 bg-black px-4 pb-2 border-t border-zinc-800 shadow-[0_-4px_20px_rgba(255,215,0,0.05)] z-50">
<div class="flex flex-col items-center justify-center text-zinc-500 opacity-60 hover:opacity-100 hover:text-yellow-400 cursor-pointer">
<span class="material-symbols-outlined">home</span>
<span class="font-mono text-[10px] uppercase font-bold mt-1">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-500 opacity-60 hover:opacity-100 hover:text-yellow-400 cursor-pointer">
<span class="material-symbols-outlined">bolt</span>
<span class="font-mono text-[10px] uppercase font-bold mt-1">Battle</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-500 opacity-60 hover:opacity-100 hover:text-yellow-400 cursor-pointer">
<span class="material-symbols-outlined">code</span>
<span class="font-mono text-[10px] uppercase font-bold mt-1">Problems</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-500 opacity-60 hover:opacity-100 hover:text-yellow-400 cursor-pointer">
<span class="material-symbols-outlined">leaderboard</span>
<span class="font-mono text-[10px] uppercase font-bold mt-1">Rank</span>
</div>
<!-- Active Tab: Profile -->
<div class="flex flex-col items-center justify-center text-yellow-500 scale-110 transition-transform cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-mono text-[10px] uppercase font-bold mt-1">Profile</span>
</div>
</nav>
