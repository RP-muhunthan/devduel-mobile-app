<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Roboto:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#4d4732",
                        "surface-container-lowest": "#0d0e0f",
                        "surface-container-low": "#1a1c1c",
                        "on-tertiary": "#373100",
                        "secondary-fixed-dim": "#f7bd48",
                        "primary-container": "#ffd700",
                        "surface-bright": "#38393a",
                        "on-secondary-fixed": "#271900",
                        "on-error": "#690005",
                        "surface-tint": "#e9c400",
                        "secondary-fixed": "#ffdea6",
                        "surface-container-high": "#292a2a",
                        "primary": "#fff6df",
                        "outline": "#999077",
                        "tertiary-fixed-dim": "#dcc82c",
                        "tertiary": "#fff6d2",
                        "surface-container-highest": "#343535",
                        "on-tertiary-container": "#6b5f00",
                        "error": "#ffb4ab",
                        "primary-fixed-dim": "#e9c400",
                        "on-primary-container": "#705e00",
                        "on-background": "#e3e2e2",
                        "surface-container": "#1e2020",
                        "on-surface": "#e3e2e2",
                        "primary-fixed": "#ffe16d",
                        "on-primary": "#3a3000",
                        "on-secondary-container": "#392700",
                        "surface-variant": "#343535",
                        "on-tertiary-fixed-variant": "#504700",
                        "background": "#121414",
                        "error-container": "#93000a",
                        "surface": "#121414",
                        "on-primary-fixed-variant": "#544600",
                        "surface-dim": "#121414",
                        "tertiary-container": "#f1db40",
                        "inverse-primary": "#705d00",
                        "inverse-on-surface": "#2f3131",
                        "tertiary-fixed": "#fae448",
                        "on-tertiary-fixed": "#201c00",
                        "inverse-surface": "#e3e2e2",
                        "secondary": "#f7bd48",
                        "on-secondary": "#412d00",
                        "on-error-container": "#ffdad6",
                        "on-surface-variant": "#d0c6ab",
                        "on-primary-fixed": "#221b00",
                        "secondary-container": "#ba880f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "component-gap": "12px",
                        "gutter": "16px",
                        "container-margin": "24px",
                        "section-gap": "32px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label-caps": ["JetBrains Mono"],
                        "code-block": ["JetBrains Mono"],
                        "body-md": ["Roboto"],
                        "body-lg": ["Roboto"],
                        "headline-lg": ["Roboto"],
                        "headline-md": ["Roboto"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "code-block": ["14px", {"lineHeight": "22px", "fontWeight": "400"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .pulsing-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid #ba880f;
            border-radius: 50%;
            opacity: 0;
            animation: pulse 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .pulsing-ring-delayed {
            animation-delay: 1.5s;
        }
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#0A0A0A] text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- TopAppBar -->
<header class="bg-[#0A0A0A] border-b border-zinc-800 flex justify-between items-center px-6 py-4 w-full top-0">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-yellow-400 active:opacity-70 transition-opacity cursor-pointer" data-icon="arrow_back">arrow_back</span>
<h1 class="text-xl font-black italic tracking-tighter text-yellow-500 font-mono uppercase">DevDuel</h1>
</div>
<span class="material-symbols-outlined text-yellow-400 active:opacity-70 transition-opacity cursor-pointer" data-icon="notifications">notifications</span>
</header>
<!-- Main Content: Matchmaking Canvas -->
<main class="flex-grow flex flex-col items-center justify-center relative px-container-margin overflow-hidden">
<!-- Background Animation Layer -->
<div class="absolute inset-0 flex items-center justify-center -z-10 pointer-events-none">
<div class="relative w-48 h-48 flex items-center justify-center">
<div class="pulsing-ring"></div>
<div class="pulsing-ring pulsing-ring-delayed"></div>
</div>
</div>
<!-- Finding Opponent Header -->
<div class="text-center mb-12">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">Finding Opponent...</h2>
<div class="flex items-center justify-center gap-2">
<div class="w-2 h-2 bg-secondary rounded-full"></div>
<p class="font-label-caps text-label-caps text-secondary">Estimated wait time: "~15 seconds"</p>
</div>
</div>
<!-- Matchup Section -->
<div class="w-full max-w-lg flex items-center justify-between mb-section-gap relative">
<!-- User Avatar -->
<div class="flex flex-col items-center gap-4 flex-1">
<div class="relative">
<div class="w-24 h-24 rounded-full border-2 border-secondary p-1">
<img alt="User Avatar" class="w-full h-full rounded-full object-cover" data-alt="A close-up portrait of a professional male developer with a modern tech aesthetic. He is lit by cool blue and warm amber studio lighting against a dark, tech-inspired background. The image has a high-end, crisp digital photography feel, perfectly matching a premium e-sports or competitive programming interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDL4za8comt6euE_G3XcIweJ9jiN_MraFM7ar8d02pMIyRgVeZPOM623LTFUsBIf3m8PDZepk0OcNudteawOGjb69-VJ6CmcC06bAChmnEyG70nOep7jGQQ0k7RmsRGVrcHXyKmSttvcRjEext62ZGwGpPhIaPOrKadnJTdK8NN-eKkHYFYSc1bOJO9X7hcpeGzBhQdO_ijgHPorJSVjBLmuBITbxvYxr8sOn0AU2itXE2y0LDqMTjDMrgMvSzz3-mnGsB_ZRWhmwTa"/>
</div>
<div class="absolute -bottom-1 -right-1 bg-secondary text-on-secondary text-[10px] px-2 py-0.5 font-bold rounded-sm">YOU</div>
</div>
<p class="font-label-caps text-label-caps text-on-surface">RANK: ELITE</p>
</div>
<!-- VS Divider -->
<div class="flex flex-col items-center justify-center">
<span class="font-mono text-4xl font-black italic text-secondary tracking-widest px-4">VS</span>
</div>
<!-- Opponent (Searching) -->
<div class="flex flex-col items-center gap-4 flex-1">
<div class="w-24 h-24 rounded-full border-2 border-zinc-800 bg-surface-container flex items-center justify-center relative">
<span class="material-symbols-outlined text-zinc-600 text-5xl" data-icon="question_mark">question_mark</span>
<!-- Spinner overlay for the icon -->
<div class="absolute inset-0 border-2 border-t-secondary border-transparent rounded-full animate-spin"></div>
</div>
<p class="font-label-caps text-label-caps text-zinc-600">SEARCHING...</p>
</div>
</div>
<!-- Selected Tags/Chips -->
<div class="flex flex-wrap justify-center gap-3 mb-12">
<div class="bg-surface-container border border-outline-variant px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="terminal">terminal</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">PYTHON 3.10</span>
</div>
<div class="bg-surface-container border border-outline-variant px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="bolt">bolt</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">HARD DIFFICULTY</span>
</div>
<div class="bg-surface-container border border-outline-variant px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="psychology">psychology</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">GRAPH THEORY</span>
</div>
</div>
<!-- Cancel Action -->
<button class="w-full max-w-xs h-12 border border-secondary text-secondary font-label-caps text-label-caps rounded-sm hover:bg-secondary/10 transition-colors active:scale-95 duration-200">
            CANCEL MATCHMAKING
        </button>
</main>
<!-- Footer Meta (Simulated loading state bar) -->
<div class="fixed bottom-16 left-0 w-full h-1 bg-zinc-900 overflow-hidden">
<div class="h-full bg-secondary w-1/3 animate-[progress_15s_ease-in-out_infinite]"></div>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-[#0A0A0A] px-2 border-t border-zinc-800">
<button class="flex flex-col items-center justify-center text-zinc-600 hover:bg-zinc-900/50 flex-1 h-full active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-[10px] font-mono font-bold uppercase mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-yellow-400 scale-105 hover:bg-zinc-900/50 flex-1 h-full active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="sports_esports" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
<span class="text-[10px] font-mono font-bold uppercase mt-1">Battle</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-600 hover:bg-zinc-900/50 flex-1 h-full active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="terminal">terminal</span>
<span class="text-[10px] font-mono font-bold uppercase mt-1">Problems</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-600 hover:bg-zinc-900/50 flex-1 h-full active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="text-[10px] font-mono font-bold uppercase mt-1">Leaderboard</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-600 hover:bg-zinc-900/50 flex-1 h-full active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[10px] font-mono font-bold uppercase mt-1">Profile</span>
</button>
</nav>
<style>
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</body></html>
