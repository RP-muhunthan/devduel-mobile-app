[pytest]
# ── Test discovery ────────────────────────────────────────────────────────────
testpaths       = tests
python_files    = test_*.py
python_classes  = Test*
python_functions= test_*

# ── Output verbosity ──────────────────────────────────────────────────────────
addopts =
    --tb=short
    --strict-markers
    -v
    --html=reports/pytest_report.html
    --self-contained-html

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    smoke:      Critical smoke tests
    regression: Full regression suite
    auth:       Authentication tests
    home:       Home dashboard tests
    battle:     Battle arena tests
    problems:   Problems screen tests
    leaderboard: Leaderboard tests
    profile:    Profile tests
    navigation: Navigation flow tests
    category:   Testing category classification (Functional, Security, Performance, Database, API, etc.)

